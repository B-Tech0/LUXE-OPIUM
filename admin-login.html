<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login — LUXE OPIUM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500;700&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy: #0a0e1a;
    --deep-blue: #111827;
    --mid-blue: #1a2540;
    --gold: #c9a96e;
    --gold-light: #e8c98a;
    --gold-dim: #8a6f3f;
    --white: #f5f0e8;
    --cream: #ede5d0;
    --glass: rgba(201,169,110,0.07);
    --glass-border: rgba(201,169,110,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-container {
    background: var(--deep-blue);
    border: 1px solid var(--glass-border);
    padding: 60px 40px;
    max-width: 450px;
    width: 100%;
    box-shadow: 0 25px 50px rgba(0,0,0,0.8);
  }

  .login-header {
    text-align: center;
    margin-bottom: 50px;
  }

  .login-logo {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    letter-spacing: 0.25em;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .login-subtitle {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-dim);
  }

  .form-group {
    margin-bottom: 25px;
  }

  .form-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-dim);
    display: block;
    margin-bottom: 10px;
  }

  .form-input {
    width: 100%;
    padding: 14px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--white);
    font-family: 'Raleway', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.3s;
  }

  .form-input:focus {
    border-color: var(--gold);
  }

  .form-input::placeholder {
    color: rgba(255,255,255,0.3);
  }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    color: var(--navy);
    border: none;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 10px;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(201,169,110,0.3);
  }

  .error-message {
    color: #ff6b6b;
    font-size: 12px;
    margin-top: 10px;
    text-align: center;
    display: none;
  }

  .error-message.show {
    display: block;
  }

  .login-footer {
    text-align: center;
    margin-top: 40px;
    font-size: 10px;
    color: var(--gold-dim);
    letter-spacing: 0.1em;
  }

  .login-footer a {
    color: var(--gold);
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <div class="login-logo">LUXE OPIUM</div>
    <div class="login-subtitle">Admin Portal</div>
  </div>

  <form id="loginForm">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-input" placeholder="Enter username" required>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-input" placeholder="Enter password" required>
    </div>

    <button type="submit" class="btn-login">Login</button>
    <div class="error-message" id="errorMsg">Invalid credentials. Please try again.</div>
  </form>

  <div class="login-footer">
    <p>Protected Admin Area</p>
  </div>
</div>

<script>
  const ADMIN_USERNAME = 'LUXEOPIUM';
  const ADMIN_PASSWORD = 'OPIUMLUXE1234!';

  document.getElementById('loginForm').onsubmit = (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');

    if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
      localStorage.setItem('luxe_opium_admin_logged_in', 'true');
      window.location.href = 'admin-dashboard.html';
    } else {
      errorMsg.classList.add('show');
      setTimeout(() => errorMsg.classList.remove('show'), 3000);
    }
  };
</script>

</body>
</html>
